    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --button-color: #751a1a;
            --overlay-shadow: linear-gradient(to top, rgba(0, 0, 0, 0.85) 0%, rgba(0, 0, 0, 0) 100%);
        }

        body {
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
            background-color: #000;
        }

        /* Utilitários de Transição e Camadas */
        .camada {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: opacity 0.8s ease-in-out;
        }

        /* Contorno Cinza no Texto (Stroke) */
        .texto-capa {
            color: white;
            text-shadow:
                -1px -1px 0 #555,
                1px -1px 0 #555,
                -1px 1px 0 #555,
                1px 1px 0 #555;
        }

        /* Animação da Mãozinha */
        @keyframes clicando {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(0.9);
            }
        }

        .animar-clique {
            animation: clicando 1.5s infinite ease-in-out;
        }

        /* Classes de Estado */
        .invisivel {
            opacity: 0;
            pointer-events: none;
        }

        .visivel {
            opacity: 1;
            pointer-events: auto;
        }

        /* Sombra suave para o cronômetro */
        .texto-sombra {
            text-shadow: 0px 2px 4px rgba(0, 0, 0, 0.8);
        }

        /* Dynamic button styling */
        .custom-button-bg {
            background-color: var(--button-color) !important;
        }

        /* Modal Styles */
        .modal {
            position: fixed;
            inset: 0;
            background-color: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            z-index: 200;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            padding: 1rem;
        }

        .modal.active {
            opacity: 1;
            pointer-events: auto;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #ccc;
            border-radius: 10px;
        }

        /* Loading Screen */
        #loader {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 999;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-left-color: #fff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* CapCut-style Sparkle Transition */
        .slide-transition {
            position: absolute;
            inset: 0;
            z-index: 25;
            pointer-events: none;
            opacity: 0;
            overflow: hidden;
        }

        .slide-transition.active {
            opacity: 1;
        }

        .slide-transition canvas {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
        }

        /* Sparkle Overlays */
        .brilho-camada {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 15; /* Between background (10) and HUD (30) */
            object-fit: contain; /* The user said they are already in correct positions for 9:16 */
            opacity: 0;
            transition: opacity 1s ease;
        }

        .brilho-camada.ativo {
            opacity: 1;
        }

        /* Continuous Opening Particles */
        .opening-particles {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 22; /* Above opening media (20), below transition (25) */
            opacity: 0;
            transition: opacity 1s ease;
        }

        .opening-particles.ativo {
            opacity: 1;
        }

        /* Photo Gallery Popup */
        .gallery-modal {
            position: fixed;
            inset: 0;
            background-color: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            z-index: 300;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            padding: 1rem;
        }
        .gallery-modal.active {
            opacity: 1;
            pointer-events: auto;
        }
        .gallery-container {
            position: relative;
            max-width: 90vw;
            max-height: 85vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .gallery-image {
            max-width: 90vw;
            max-height: 80vh;
            object-fit: contain;
            border-radius: 12px;
            box-shadow: 0 8px 40px rgba(0,0,0,0.6);
            transition: opacity 0.3s ease;
        }
        .gallery-close {
            position: absolute;
            top: -14px;
            right: -14px;
            z-index: 310;
            background: rgba(0,0,0,0.7);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.1rem;
            transition: all 0.2s ease;
        }
        .gallery-close:hover {
            background: rgba(255,255,255,0.2);
            transform: scale(1.1);
        }
        .gallery-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            z-index: 310;
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.2rem;
            transition: all 0.2s ease;
        }
        .gallery-arrow:hover {
            background: rgba(255,255,255,0.15);
        }
        .gallery-arrow.left { left: -56px; }
        .gallery-arrow.right { right: -56px; }
        @media (max-width: 600px) {
            .gallery-arrow.left { left: 8px; }
            .gallery-arrow.right { right: 8px; }
            .gallery-arrow { background: rgba(0,0,0,0.7); }
        }
        .gallery-counter {
            position: absolute;
            bottom: -30px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.6);
            font-size: 0.75rem;
            font-family: 'Montserrat', sans-serif;
        }
    </style>
</head>

    <!-- MAIN SCRIPT LOGIC -->
    <script>
        let config = null;
        let transicaoFeita = false;
        let estaMutado = false;
        let iniciouInteracao = false;
        let currentRSVPNumber = "";
        let acompCount = 0;

        // Sequence Player State
        let slideAssets = [];
        let currentSlideIndex = 0;
        let slideTimer = null;
        let isTransitioning = false;

        // Script to fix window inner height on iOS
        function setViewportHeight() {
            let vh = window.innerHeight * 0.01;
            document.documentElement.style.setProperty('--vh', `${vh}px`);
        }
        window.addEventListener('resize', setViewportHeight);
        setViewportHeight();

        // References
        const capa = document.getElementById('capaInicial');
        const videoAbertura = document.getElementById('videoAbertura');
        const imgAbertura = document.getElementById('imgAbertura');
        const fundoTelaVideo = document.getElementById('fundoTelaVideo');
        const fundoTelaImg = document.getElementById('fundoTelaImg');
        const audio = document.getElementById('musicaFundo');
        const btnPular = document.getElementById('btnPular');
        const btnMute = document.getElementById('btnMute');
        const iconMute = document.getElementById('iconMute');
        const containerBotoes = document.getElementById('containerBotoes');
        const containerShadow = document.getElementById('containerShadow');
        const gridBotoes = document.getElementById('gridBotoes');

        // Robust Video Function from v5
        function setupRobustVideo(videoElement) {
            if (!videoElement) return;
            videoElement.setAttribute('playsinline', '');
            videoElement.setAttribute('webkit-playsinline', '');
            videoElement.setAttribute('preload', 'auto');

            let stuckTimer = null;
            let lastTime = -1;

            videoElement.addEventListener('waiting', () => {
                clearTimeout(stuckTimer);
                stuckTimer = setTimeout(() => {
                    if (videoElement.paused) videoElement.play().catch(() => { });
                }, 5000);
            });

            videoElement.addEventListener('playing', () => clearTimeout(stuckTimer));

            videoElement.addEventListener('error', () => {
                setTimeout(() => {
                    videoElement.load();
                    videoElement.play().catch(e => console.log('Retry play failed', e));
                }, 3000);
            });

            setInterval(() => {
                if (!videoElement.paused && !videoElement.ended && videoElement.readyState > 2) {
                    lastTime = videoElement.currentTime;
                }
            }, 2000);
        }

        async function init() {
            try {
                // Config is now loaded synchronously via a <script> tag before this runs
                if (typeof window.config !== 'undefined') {
                    config = window.config;
                    applyConfig();
                } else {
                    console.error("Erro: config.js não foi carregado corretamente.");
                }

                document.getElementById('loader').style.display = 'none';

                // Setup Videos: background + abertura both get robust retry for Safari/Mi Browser
                setupRobustVideo(document.getElementById('fundoTelaVideo'));
                setupRobustVideo(document.getElementById('videoAbertura'));

            } catch (err) {
                console.error("Erro ao carregar config.json:", err);
            }
        }

        function applyConfig() {
            // SEO
            document.title = config.convite.seo.pageTitle || "Convite";
            document.querySelector("meta[property='og:title']").content = config.convite.seo.ogTitle || "";
            document.querySelector("meta[property='og:description']").content = config.convite.seo.ogDescription || "";
            if (config.assets.capa) document.querySelector("meta[property='og:image']").content = config.assets.capa;

            // Styles
            document.documentElement.style.setProperty('--button-color', config.config.buttonColor || "#751a1a");
            if (config.config.shadowStyle) {
                document.getElementById('containerShadow').style.background = config.config.shadowStyle;
            }

            // Capa
            if (config.assets.capa) {
                capa.style.backgroundImage = `url('${config.assets.capa}')`;
            }

            // Música
            if (config.assets.musica) {
                audio.src = config.assets.musica;
                audio.load();
            }

            // Background Media
            const bgMediaUrl = config.assets.folhaVazia || config.assets.folhaPreenchida;
            if (bgMediaUrl) {
                if (bgMediaUrl.endsWith('.mp4')) {
                    fundoTelaVideo.src = bgMediaUrl;
                    fundoTelaVideo.load();
                } else {
                    fundoTelaImg.src = bgMediaUrl;
                }
            }

            // Sparkles
            document.getElementById('brilhoEsquerdo').src = "https://qhrjyhnbcqllbsfuzlmj.supabase.co/storage/v1/object/public/convite-assets/Livia15Anos/brilho_esquerdo_1777312606200.gif";
            document.getElementById('brilhoDireito').src = "https://qhrjyhnbcqllbsfuzlmj.supabase.co/storage/v1/object/public/convite-assets/Livia15Anos/brilho_direito_1777312606200.gif";
            document.getElementById('brilhoCentro').src = "https://qhrjyhnbcqllbsfuzlmj.supabase.co/storage/v1/object/public/convite-assets/Livia15Anos/brilho_centro_1777312606200.gif";

            // Abertura Media — preload ALL slides and show progress bar
            slideAssets = config.assets.aberturaSlides || [];
            preloadAllSlides();

            // Render Buttons based on config arrays
            renderButtons(config.botoes || []);

            // Photo Gallery
            if (config.upsell && config.upsell.galeriaFotos && config.assets.fotos && config.assets.fotos.length > 0) {
                galleryPhotos = config.assets.fotos;
            }

            // Timer: cronometro (grátis) separado de lembrete (upsell pago)
            // Fallback para legado: se cronometro nao definido, usa lembrete
            const hasCronometro = config.config.cronometro === true;
            const hasLembrete = config.upsell?.lembrete === true;
            if (config.evento.data && (hasCronometro || hasLembrete)) {
                setupCountdown();
            }

            // Interaction Event (will be enabled after preload finishes)
            capa.addEventListener('click', startSequence);

            // Watermark (Pagamento Pendente)
            const watermarkEl = document.getElementById('watermark');
            if (watermarkEl) {
                if (config.config.exibirMarcaDagua) {
                    watermarkEl.classList.remove('hidden');
                } else {
                    watermarkEl.classList.add('hidden');
                }
            }
        }

        // ==========================================
        // BUTTON RENDERING & SIZING
        // ==========================================
        function renderButtons(buttonsData) {
            gridBotoes.innerHTML = '';
            const btnCount = buttonsData.length;
            const sizeMultiplier = config.config.buttonSize || 1.0;
            const isFilled = config.config.isButtonFilled !== false;

            let gridClasses = "flex flex-row justify-center items-start transition-all duration-300 gap-2";
            if (btnCount > 4) {

                    anchor.onclick = (e) => { e.preventDefault(); openRSVPModal(btn); };
                }

                // Sizing Details
                const basePx = 48;
                const sizePx = basePx * sizeMultiplier;
                const baseIconRem = 1.125;
                const iconRem = baseIconRem * sizeMultiplier;

                if (btn.tipoVisual === 'imagem' && btn.urlImagem) {

        function autoSizeButtonLabels() {
            const labels = Array.from(gridBotoes.querySelectorAll('.btn-label'));
            if (!labels.length) return;
            
            // Base size depends on number of buttons. If <= 4, 10px is great. If more, start at 9.
            let fontSize = labels.length > 4 ? 9 : 10;
            const minFontSize = 7.5; // Legibility threshold
            
            // Allow lines to wrap naturally
            labels.forEach(l => {
                l.style.whiteSpace = 'normal';
                l.style.wordWrap = 'normal';
                l.style.lineHeight = '1.1';
            });
            
            function hasOverflow() {
                for (const label of labels) {
                    const words = label.textContent.trim().split(/\s+/);
                    const containerWidth = label.closest('a').clientWidth;
                    
                    for (const word of words) {
                        const temp = document.createElement('span');
                        temp.style.cssText = `font-size:${fontSize}px;font-weight:700;letter-spacing:0.025em;text-transform:uppercase;visibility:hidden;position:absolute;white-space:nowrap;font-family:'Montserrat',sans-serif;`;
                        temp.textContent = word;
                        document.body.appendChild(temp);
                        const wordWidth = temp.offsetWidth;
                        document.body.removeChild(temp);
                        
                        // We leave 2px padding on each side (4px total)
                        if (wordWidth > containerWidth - 4) {
                            return true; // This word is too big, shrink everything
                        }
                    }
                }
                return false;
            }
            
            // Iteratively shrink ALL labels together to maintain uniformity
            while (fontSize > minFontSize && hasOverflow()) {
                fontSize -= 0.5;
            }
            
            labels.forEach(l => l.style.fontSize = fontSize + 'px');
            
            // If we hit the absolute minimum and still have overflow, apply tighter letter spacing
            if (hasOverflow()) {
                labels.forEach(l => {
                    l.classList.remove('tracking-wide');
                    l.style.letterSpacing = '-0.03em';
                });
            }
        }

        // ==========================================
        // ASSET PRELOADER
        // ==========================================
        function preloadAllSlides() {
            const preloaderUI = document.getElementById('preloaderUI');
            const preloaderBar = document.getElementById('preloaderBar');
            const preloaderSlow = document.getElementById('preloaderSlow');
            const dicaContainer = document.getElementById('dicaInteractionContainer');

            if (slideAssets.length === 0) {
                // No slides to preload — show interact button immediately
                preloaderUI.style.opacity = '0';
                setTimeout(() => { preloaderUI.style.display = 'none'; }, 500);
                dicaContainer.style.opacity = '1';
                dicaContainer.style.pointerEvents = 'auto';
                return;
            }

            let loaded = 0;
            const total = slideAssets.length;

            // Show slow connection warning after 5s
            const slowTimer = setTimeout(() => {
                preloaderSlow.style.opacity = '1';
            }, 5000);

            function onAssetLoaded() {
                loaded++;
                const pct = Math.round((loaded / total) * 100);
                preloaderBar.style.width = pct + '%';

                if (loaded >= total) {
                    clearTimeout(slowTimer);
                    // All assets loaded — fade out loader, show interact button
                    preloaderUI.style.opacity = '0';
                    setTimeout(() => {
                        preloaderUI.style.display = 'none';
                        dicaContainer.style.opacity = '1';
                        dicaContainer.style.pointerEvents = 'auto';
                    }, 500);
                }
            }

            slideAssets.forEach(url => {
                const isVideo = url.endsWith('.mp4') || url.endsWith('.webm');
                if (isVideo) {
                    // Preload video by fetching blob into cache
                    fetch(url)
                        .then(r => r.blob())
                        .then(() => onAssetLoaded())
                        .catch(() => onAssetLoaded()); // count as loaded even if failed
                } else {
                    // Preload image
                    const img = new Image();
                    img.onload = onAssetLoaded;
                    img.onerror = onAssetLoaded;
                    img.src = url;
                }
            });
        }

        // ==========================================
        // SEQUENCE & TRANSITIONS (CAPCUT STYLE)
        // ==========================================
        function startSequence() {
            if (iniciouInteracao) return;
            iniciouInteracao = true;

            capa.classList.add('invisivel');
            btnMute.classList.remove('invisivel');

            if (audio && config.assets.musica) {
                audio.volume = 0.5;
                audio.play().catch(e => { setTimeout(() => audio.play(), 500); });
            }

            if (fundoTelaVideo && fundoTelaVideo.src) {
                fundoTelaVideo.play().catch(e => console.log("Bg play failed"));
            }

            if (config.convite.tipoAbertura === 'nenhuma' || slideAssets.length === 0) {
                irParaLoop();
            } else {
                // Only show "Pular" if there are 2+ slides (meaningful sequence)
                if (slideAssets.length > 1) btnPular.classList.remove('invisivel');
                
                if (config.convite.particulasAbertura) {
                    startOpeningParticles();
                }

                playSlide(0);
            }
        }

        function playSlide(index, onReady) {
            if (index >= slideAssets.length) {
                irParaLoop();
                return;
            }

            currentSlideIndex = index;
            const slideUrl = slideAssets[index];
            const isVideo = slideUrl.endsWith('.mp4') || slideUrl.endsWith('.webm');

            // Clean up both elements
            videoAbertura.onended = null;
            videoAbertura.oncanplay = null;
            videoAbertura.ontimeupdate = null;
            videoAbertura.classList.add('invisivel');
            imgAbertura.classList.add('invisivel');
            clearTimeout(slideTimer);

            if (isVideo) {
                videoAbertura.src = slideUrl;
                
                // Use 'playing' event — fires only when the first frame is actually visible
                let readyFired = false;
                videoAbertura.oncanplay = () => {
                    videoAbertura.oncanplay = null;
                    // INSTANT show — bypass .camada CSS transition
                    videoAbertura.style.transition = 'none';
                    videoAbertura.classList.remove('invisivel');
                    videoAbertura.offsetHeight; // force reflow
                    videoAbertura.style.transition = '';
                    videoAbertura.play().catch(e => console.warn("Play blocked:", e));
                };
                
                videoAbertura.addEventListener('playing', function onPlaying() {
                    videoAbertura.removeEventListener('playing', onPlaying);
                    if (readyFired) return;
                    readyFired = true;
                    // Small buffer so GPU composites the frame before white recedes
                    setTimeout(() => {
                        if (onReady) { onReady(); onReady = null; }
                    }, 100);
                });
                
                // Pre-trigger transition BEFORE video ends (only if there are more slides)
                let transitionTriggered = false;
                
                if (index < slideAssets.length - 1) {
                    // Multiple slides — transition to next slide
                    videoAbertura.ontimeupdate = () => {
                        if (transitionTriggered) return;
                        if (videoAbertura.duration > 0 && videoAbertura.currentTime >= videoAbertura.duration - 0.8) {
                            transitionTriggered = true;
                            videoAbertura.ontimeupdate = null;
                            triggerTransition(index + 1);
                        }
                    };
                    videoAbertura.onended = () => {
                        if (!transitionTriggered) {
                            transitionTriggered = true;
                            videoAbertura.onended = null;
                            triggerTransition(index + 1);
                        }
                    };
                } else {
                    // Last or only slide — go to main loop when done
                    videoAbertura.onended = () => {
                        videoAbertura.onended = null;
                        irParaLoop();
                    };
                }
                
                videoAbertura.load();
            } else {
                const img = imgAbertura;
                img.onload = () => {
                    img.classList.remove('invisivel');
                    // Signal: image is visible, white can now fade out
                    if (onReady) { onReady(); onReady = null; }
                    img.onload = null;
                };
                img.src = slideUrl;
                
                // If image is cached, onload may not fire
                if (img.complete) {
                    img.classList.remove('invisivel');
                    if (onReady) { onReady(); onReady = null; }
                }
                
                // Images display for 4 seconds before next action
                slideTimer = setTimeout(() => {
                    if (index < slideAssets.length - 1) {
                        triggerTransition(index + 1);
                    } else {
                        irParaLoop();
                    }
                }, 4000);
            }
        }

        // ==========================================
        // SPARKLE CANVAS TRANSITION ENGINE
        // ==========================================
        function createSparkleParticles(w, h) {
            const particles = [];
            // Sparkle stars (small, bright, fast)
            for (let i = 0; i < 45; i++) {
                particles.push({
                    type: 'sparkle',
                    x: Math.random() * w,
                    y: Math.random() * h,
                    size: 1 + Math.random() * 4,
                    speedX: (Math.random() - 0.5) * 3,
                    speedY: (Math.random() - 0.5) * 3,
                    opacity: 0.3 + Math.random() * 0.7,
                    rotation: Math.random() * Math.PI * 2,
                    rotSpeed: (Math.random() - 0.5) * 0.15,
                    twinkleSpeed: 2 + Math.random() * 4,
                    delay: Math.random() * 0.3 // stagger entry
                });
            }
            // Bokeh circles (large, blurry, slow)
            for (let i = 0; i < 14; i++) {
                particles.push({
                    type: 'bokeh',
                    x: Math.random() * w,
                    y: Math.random() * h,
                    size: 15 + Math.random() * 50,
                    speedX: (Math.random() - 0.5) * 1.5,
                    speedY: -0.5 - Math.random() * 1.5, // float upward
                    opacity: 0.08 + Math.random() * 0.15,
                    delay: Math.random() * 0.2
                });
            }
            // Lens flare streak
            particles.push({
                type: 'flare',
                x: w * 0.3,
                y: h * 0.4,
                angle: -0.4,
                length: w * 1.5,
                opacity: 0
            });
            return particles;
        }

        function drawSparkleFrame(ctx, w, h, particles, progress, whiteAlpha) {
            ctx.clearRect(0, 0, w, h);

            // Background white wash (dip to white)
            ctx.fillStyle = `rgba(255, 255, 255, ${whiteAlpha})`;
            ctx.fillRect(0, 0, w, h);

            for (const p of particles) {
                // Stagger: particles with delay > progress haven't appeared yet
                const localProgress = Math.max(0, Math.min(1, (progress - p.delay) / (1 - p.delay)));
                if (localProgress <= 0) continue;

                const alpha = p.opacity * localProgress;

                if (p.type === 'sparkle') {
                    p.x += p.speedX;
                    p.y += p.speedY;
                    p.rotation += p.rotSpeed;
                    const twinkle = 0.5 + 0.5 * Math.sin(localProgress * p.twinkleSpeed * Math.PI);
                    const sz = p.size * (0.5 + localProgress) * twinkle;
                    
                    ctx.save();
                    ctx.translate(p.x, p.y);
                    ctx.rotate(p.rotation);
                    ctx.globalAlpha = alpha * twinkle;
                    
                    // Draw a 4-point star
                    ctx.fillStyle = '#ffffff';
                    ctx.shadowColor = 'rgba(255, 255, 255, 0.9)';
                    ctx.shadowBlur = sz * 3;
                    ctx.beginPath();
                    for (let j = 0; j < 4; j++) {
                        const angle = (j / 4) * Math.PI * 2 - Math.PI / 2;
                        const nextAngle = ((j + 0.5) / 4) * Math.PI * 2 - Math.PI / 2;
                        ctx.lineTo(Math.cos(angle) * sz * 2.5, Math.sin(angle) * sz * 2.5);
                        ctx.lineTo(Math.cos(nextAngle) * sz * 0.4, Math.sin(nextAngle) * sz * 0.4);
                    }
                    ctx.closePath();
                    ctx.fill();
                    ctx.restore();

                } else if (p.type === 'bokeh') {
                    p.x += p.speedX;
                    p.y += p.speedY;
                    const sz = p.size * (0.6 + localProgress * 0.4);
                    
                    ctx.save();
                    ctx.globalAlpha = alpha * localProgress;
                    const grad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, sz);
                    grad.addColorStop(0, 'rgba(255, 255, 255, 0.6)');
                    grad.addColorStop(0.4, 'rgba(255, 255, 240, 0.3)');
                    grad.addColorStop(1, 'rgba(255, 255, 255, 0)');
                    ctx.fillStyle = grad;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, sz, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.restore();

                } else if (p.type === 'flare') {
                    ctx.save();
                    ctx.globalAlpha = localProgress * 0.35;
                    ctx.translate(p.x, p.y);
                    ctx.rotate(p.angle);
                    const flareGrad = ctx.createLinearGradient(-p.length/2, 0, p.length/2, 0);
                    flareGrad.addColorStop(0, 'rgba(255,255,255,0)');
                    flareGrad.addColorStop(0.3, 'rgba(255,255,255,0.4)');
                    flareGrad.addColorStop(0.5, 'rgba(255,255,255,0.8)');
                    flareGrad.addColorStop(0.7, 'rgba(255,255,255,0.4)');
                    flareGrad.addColorStop(1, 'rgba(255,255,255,0)');
                    ctx.fillStyle = flareGrad;
                    const thickness = 6 + localProgress * 20;
                    ctx.fillRect(-p.length/2, -thickness/2, p.length, thickness);
                    ctx.restore();
                }
            }
            ctx.globalAlpha = 1;
            ctx.shadowBlur = 0;
        }

        function runSparkleTransition(onPeak, onComplete) {
            const canvas = document.getElementById('sparkleCanvas');
            const container = document.getElementById('mainContainer');
            const transitionEl = document.getElementById('slideTransition');
            
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;
            const ctx = canvas.getContext('2d');
            const w = canvas.width;
            const h = canvas.height;

            const particles = createSparkleParticles(w, h);
            const FADE_IN_MS = 800;
            const FADE_OUT_MS = 700;

            let peakReached = false;
            let holdReleased = false;
            let fadeOutStartTime = null;
            const startTime = performance.now();

            // This function is passed to onPeak → called when next slide is ready
            function releaseHold() {
                holdReleased = true;
                fadeOutStartTime = performance.now();
            }

            transitionEl.classList.add('active');

            function animate(now) {
                const elapsed = now - startTime;

                if (elapsed < FADE_IN_MS) {
                    // Phase 1: Build up sparkles → dip to white
                    const progress = elapsed / FADE_IN_MS;
                    const eased = progress * progress;
                    drawSparkleFrame(ctx, w, h, particles, eased, eased * 0.95);
                    requestAnimationFrame(animate);

                } else if (!holdReleased) {
                    // Phase 2: HOLD at peak white until next slide is ready
                    if (!peakReached) {
                        peakReached = true;
                        if (onPeak) onPeak(releaseHold);
                    }
                    drawSparkleFrame(ctx, w, h, particles, 1, 0.97);
                    requestAnimationFrame(animate);

                } else {
                    // Phase 3: Fade out sparkles (reverse)
                    const fadeOutElapsed = now - fadeOutStartTime;
                    if (fadeOutElapsed >= FADE_OUT_MS) {
                        // Done
                        ctx.clearRect(0, 0, w, h);
                        transitionEl.classList.remove('active');
                        if (onComplete) onComplete();
                        return;
                    }
                    const progress = 1 - (fadeOutElapsed / FADE_OUT_MS);
                    const eased = progress * progress;
                    drawSparkleFrame(ctx, w, h, particles, eased, eased * 0.9);
                    requestAnimationFrame(animate);
                }
            }

            requestAnimationFrame(animate);
        }

        function triggerTransition(nextIndex) {
            if (isTransitioning) return;
            isTransitioning = true;
            
            if (nextIndex >= slideAssets.length) {
                isTransitioning = false;
                irParaLoop();
                return;
            }
            
            runSparkleTransition(
                // onPeak: swap media, then call releaseHold when next slide is visible
                (releaseHold) => {
                    // INSTANT hide — bypass .camada CSS transition
                    videoAbertura.style.transition = 'none';
                    imgAbertura.style.transition = 'none';
                    videoAbertura.pause();
                    videoAbertura.onended = null;
                    videoAbertura.oncanplay = null;
                    videoAbertura.ontimeupdate = null;
                    videoAbertura.classList.add('invisivel');
                    imgAbertura.classList.add('invisivel');
                    // Force reflow so browser applies instantly
                    videoAbertura.offsetHeight;
                    videoAbertura.style.transition = '';
                    imgAbertura.style.transition = '';
                    // playSlide will call releaseHold when the new media is ready
                    playSlide(nextIndex, releaseHold);
                },
                // onComplete: transition animation fully done
                () => {
                    isTransitioning = false;
                }
            );
        }

        function irParaLoop() {
            if (transicaoFeita) return;
            transicaoFeita = true;

            stopOpeningParticles();

            btnPular.classList.add('invisivel');
            videoAbertura.classList.add('invisivel');
            imgAbertura.classList.add('invisivel');

            if (fundoTelaImg.getAttribute('src')) fundoTelaImg.classList.remove('invisivel');
            if (fundoTelaVideo.getAttribute('src')) fundoTelaVideo.classList.remove('invisivel');
            containerBotoes.classList.remove('invisivel');
            containerShadow.classList.remove('invisivel');

            // Mostra o timer apenas se estiver configurado e ativado
            const countdownContainer = document.getElementById('countdownContainer');
            if (countdownContainer && !countdownContainer.classList.contains('hidden')) {
                countdownContainer.classList.remove('invisivel');
            }

            // Sparkles
            if (config.config.brilhos) {
                if (config.config.brilhos.esquerdo) document.getElementById('brilhoEsquerdo').classList.add('ativo');
                if (config.config.brilhos.direito) document.getElementById('brilhoDireito').classList.add('ativo');
                if (config.config.brilhos.centro) document.getElementById('brilhoCentro').classList.add('ativo');
            }

            // Pausa intro após a transição
            setTimeout(() => videoAbertura.pause(), 800);
        }

        // Legacy V5 handlers removed — sequence player now controls videoAbertura.onended
        btnPular.onclick = () => {
            // Skip entire opening sequence
            clearTimeout(slideTimer);
            videoAbertura.onended = null;
            videoAbertura.oncanplay = null;
            videoAbertura.pause();
            stopOpeningParticles();
            irParaLoop();
        };

        };

                <div class="flex items-center gap-2 mt-2" id="check-container">
                    <input type="checkbox" id="check-no-acomp" class="w-4 h-4 rounded bg-black/40 border-stone-500 text-green-500 focus:ring-green-500 focus:ring-offset-0">
                    <label for="check-no-acomp" class="text-stone-200 text-xs cursor-pointer select-none drop-shadow">Vou sozinho(a) / Sem acompanhantes</label>
                </div>`;
            }
            
            html += `<button id="btn-submit-rsvp" class="w-full bg-green-600 hover:bg-green-500 text-white font-bold py-3 rounded-lg transition-colors mt-2 shadow-lg flex items-center justify-center gap-2">Confirmar no WhatsApp <i class="fa-solid fa-paper-plane"></i></button></div></div>`;
            
            openHtmlModal(btn, html);
            
            // Ativa os ouvintes de clique após o HTML ser injetado no modal
            setTimeout(() => {
                attachRSVPListeners();
                document.getElementById('btn-submit-rsvp').onclick = () => {
                    sendRSVP(whatsapp, rsvpConfig);
                };
            }, 50);
        };

        window.sendRSVP = function(number, rsvpConfig) {
            const currentRSVPNumber = number; // já limpo no openRSVPModal
            const txtName = document.getElementById('rsvp-name');
            const txtPhone = document.getElementById('rsvp-phone');
            
            let name = txtName ? txtName.value.trim() : "";
            let phone = txtPhone ? txtPhone.value.trim() : "";
            
            if (rsvpConfig.exibirNome && !name) return alert("Por favor, preencha seu nome.");
            if (rsvpConfig.exibirWhatsapp && !phone) return alert("Por favor, preencha seu WhatsApp.");

            let msg = `Olá! Gostaria de confirmar minha presença no ${window.config.evento.tipo} de ${window.config.evento.nome}.\n`;
            if (name) msg += `\n*Nome:* ${name}`;
            if (phone) msg += `\n*Telefone:* ${phone}`;

            if (rsvpConfig.exibirAcompanhantes) {
                const checkNoAcomp = document.getElementById('check-no-acomp');
                const acompCountTxt = document.getElementById('txt-acomp-count');
                const acompCount = acompCountTxt ? parseInt(acompCountTxt.innerText) : 0;
                
                if (checkNoAcomp && checkNoAcomp.checked) {
                    msg += `\n*Acompanhantes:* Nenhum (Vou sozinho)`;
                } else {
                    msg += `\n*Acompanhantes:* ${acompCount > 0 ? acompCount : 'Nenhum'}`;
                }
            }

            window.open(`https://wa.me/${currentRSVPNumber}?text=${encodeURIComponent(msg)}`, '_blank');
            closeModal('popupHtmlModal');
        };

        // Attach listeners if RSVP elements exist in DOM
        function attachRSVPListeners() {
            const btnDec = document.getElementById('btn-dec-acomp');
            const btnInc = document.getElementById('btn-inc-acomp');
            const checkNoAcomp = document.getElementById('check-no-acomp');
            const txtAcompCount = document.getElementById('txt-acomp-count');
            const containerAcomp = document.getElementById('container-acompanhantes');

            if(btnDec && btnInc && txtAcompCount) {
                btnDec.onclick = () => {
                    let c = parseInt(txtAcompCount.innerText);
                    if (c > 0) { c--; txtAcompCount.innerText = c; }
                };
                btnInc.onclick = () => {
                    let c = parseInt(txtAcompCount.innerText);
                    c++; txtAcompCount.innerText = c;
                };
            }

            if(checkNoAcomp && containerAcomp) {
                checkNoAcomp.onchange = (e) => {
                    if (e.target.checked) {
                        containerAcomp.classList.add('hidden');
                        if(txtAcompCount) txtAcompCount.innerText = "0";
                    } else {
                        containerAcomp.classList.remove('hidden');
                    }
                };
            }
        }

        // ==========================================
        // PHOTO GALLERY
        // ==========================================
        let galleryPhotos = [];
        let galleryIndex = 0;

        function openGallery() {
            if (!galleryPhotos.length) return;
            galleryIndex = 0;
            updateGalleryImage();
            document.getElementById('galleryModal').classList.add('active');
        }

        function closeGallery() {
            document.getElementById('galleryModal').classList.remove('active');
        }

        function galleryNext() {
            galleryIndex = (galleryIndex + 1) % galleryPhotos.length;
            updateGalleryImage();
        }

        function galleryPrev() {
            galleryIndex = (galleryIndex - 1 + galleryPhotos.length) % galleryPhotos.length;
            updateGalleryImage();
        }

        function updateGalleryImage() {
            const img = document.getElementById('galleryImage');
            img.style.opacity = '0';
            setTimeout(() => {
                img.src = galleryPhotos[galleryIndex];
                img.onload = () => { img.style.opacity = '1'; };
            }, 150);
            document.getElementById('galleryCounter').textContent =
                `${galleryIndex + 1} / ${galleryPhotos.length}`;
        }

        // Keyboard navigation for gallery
        document.addEventListener('keydown', (e) => {
            const modal = document.getElementById('galleryModal');
            if (!modal.classList.contains('active')) return;
            if (e.key === 'ArrowRight') galleryNext();
            else if (e.key === 'ArrowLeft') galleryPrev();
            else if (e.key === 'Escape') closeGallery();
        });

        // ==========================================
        // COUNTDOWN
        // ==========================================
        function setupCountdown() {
            const container = document.getElementById('countdownContainer');
            const dataAlvo = new Date(`${config.evento.data}T${config.evento.hora || '00:00'}:00`);

            if (isNaN(dataAlvo.getTime())) return;
            container.classList.remove('hidden');
            // Starts invisible, shown when opening video ends

            function update() {
                const agora = new Date();
                let diferenca = dataAlvo - agora;

                if (diferenca <= 0) {
                    document.getElementById('contadorMeses').innerText = "00";
                    document.getElementById('contadorDias').innerText = "00";
                    document.getElementById('contadorHoras').innerText = "00";
                    document.getElementById('contadorMinutos').innerText = "00";
                    document.getElementById('contadorSegundos').innerText = "00";
                    return;
                }

                let anos = dataAlvo.getFullYear() - agora.getFullYear();
                let meses = dataAlvo.getMonth() - agora.getMonth();
                let dias = dataAlvo.getDate() - agora.getDate();
                let horas = dataAlvo.getHours() - agora.getHours();
                let minutos = dataAlvo.getMinutes() - agora.getMinutes();

                if (minutos < 0) { minutos += 60; horas--; }
                if (horas < 0) { horas += 24; dias--; }
                if (dias < 0) {
                    const mesAnterior = new Date(dataAlvo.getFullYear(), dataAlvo.getMonth(), 0);
                    dias += mesAnterior.getDate();
                    meses--;
                }
                if (meses < 0) { meses += 12; anos--; }

                let segundos = Math.floor((diferenca % (1000 * 60)) / 1000);
                const totalMeses = (anos * 12) + meses;
                const fmt = (num) => num < 10 ? `0${num}` : num;

                document.getElementById('contadorMeses').innerText = fmt(totalMeses);
                document.getElementById('contadorDias').innerText = fmt(dias);
                document.getElementById('contadorHoras').innerText = fmt(horas);
                document.getElementById('contadorMinutos').innerText = fmt(minutos);
                document.getElementById('contadorSegundos').innerText = fmt(segundos);
            }

            update();
            setInterval(update, 1000);
        }

        // ==========================================
        // CONTINUOUS OPENING PARTICLES (CAPCUT EFFECT)
        // ==========================================
        let openingParticlesRAF = null;

        function startOpeningParticles() {
            if (openingParticlesRAF) return;
            const canvas = document.getElementById('openingParticlesCanvas');
            if (!canvas) return;
            
            canvas.classList.remove('invisivel');
            setTimeout(() => canvas.classList.add('ativo'), 50); // slight delay for transition
            
            const container = document.getElementById('mainContainer');
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;
            const ctx = canvas.getContext('2d');
            const w = canvas.width;
            const h = canvas.height;
            
            const particles = [];
            
            // Huge Bokeh (very blurry, deep warm colors, low opacity)
            for(let i=0; i<12; i++) {
                particles.push({
                    type: 'huge',
                    x: Math.random() * w,
                    y: Math.random() * h,
                    size: 80 + Math.random() * 120, // 80-200px
                    speedY: 0.2 + Math.random() * 0.3, // Faster fall
                    speedX: (Math.random() - 0.5) * 0.2,
                    opacity: 0.03 + Math.random() * 0.08
                });
            }

            // Large Bokeh (blurry, warm colors)
            for(let i=0; i<18; i++) {
                particles.push({
                    type: 'large',
                    x: Math.random() * w,
                    y: Math.random() * h,
                    size: 30 + Math.random() * 50, // 30-80px
                    speedY: 0.3 + Math.random() * 0.4, // Faster fall
                    speedX: (Math.random() - 0.5) * 0.3,
                    opacity: 0.05 + Math.random() * 0.15
                });
            }
            
            // Small Bokeh (sharper, brighter, yellow/white)
            for(let i=0; i<15; i++) {
                particles.push({
                    type: 'small',
                    x: Math.random() * w,
                    y: Math.random() * h,
                    size: 4 + Math.random() * 16, // 4-20px
                    speedY: 0.4 + Math.random() * 0.5, // Faster fall
                    speedX: (Math.random() - 0.5) * 0.4,
                    opacity: 0.15 + Math.random() * 0.35
                });
            }

            function draw() {
                ctx.clearRect(0, 0, w, h);
                ctx.globalCompositeOperation = 'screen'; // Looks better for overlapping lights
                
                for (const p of particles) {
                    p.y += p.speedY;
                    p.x += p.speedX;
                    
                    if (p.y > h + p.size) {
                        p.y = -p.size;
                        p.x = Math.random() * w;
                    }
                    if (p.x > w + p.size) p.x = -p.size;
                    if (p.x < -p.size) p.x = w + p.size;
                    
                    const grad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.size);
                    
                    if (p.type === 'huge') {
                        // Deep red/orange, very soft
                        grad.addColorStop(0, `rgba(255, 120, 80, ${p.opacity})`);
                        grad.addColorStop(0.5, `rgba(255, 100, 50, ${p.opacity * 0.5})`);
                        grad.addColorStop(1, `rgba(255, 100, 50, 0)`);
                    } else if (p.type === 'large') {
                        // Warm orange/peach
                        grad.addColorStop(0, `rgba(255, 180, 120, ${p.opacity})`);
                        grad.addColorStop(0.5, `rgba(255, 150, 80, ${p.opacity * 0.5})`);
                        grad.addColorStop(1, `rgba(255, 150, 80, 0)`);
                    } else {
                        // Bright yellow/white, sharper
                        grad.addColorStop(0, `rgba(255, 250, 200, ${p.opacity})`);
                        grad.addColorStop(0.4, `rgba(255, 240, 150, ${p.opacity * 0.8})`);
                        grad.addColorStop(1, `rgba(255, 240, 150, 0)`);
                    }
                    
                    ctx.fillStyle = grad;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
                    ctx.fill();
                }
                
                openingParticlesRAF = requestAnimationFrame(draw);
            }
            
            draw();
        }

        function stopOpeningParticles() {
            const canvas = document.getElementById('openingParticlesCanvas');
            if (canvas) {
                canvas.classList.remove('ativo');
                setTimeout(() => {
                    canvas.classList.add('invisivel');
                    if (openingParticlesRAF) {
                        cancelAnimationFrame(openingParticlesRAF);
                        openingParticlesRAF = null;
                    }
                }, 1000); // Wait for CSS opacity fade
            }
        }

        init();
    </script>
