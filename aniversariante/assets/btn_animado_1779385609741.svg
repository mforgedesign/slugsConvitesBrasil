<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
    <radialGradient id="gradPulse" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" style="stop-color:#00c6ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0072ff;stop-opacity:1" />
    </radialGradient>
  </defs>
  <!-- Background circle with CSS pulse animation within SVG -->
  <style>
    @keyframes pulse {
      0% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.05); opacity: 0.9; }
      100% { transform: scale(1); opacity: 1; }
    }
    @keyframes spin {
      100% { transform: rotate(360deg); }
    }
    .pulsing {
      animation: pulse 2s infinite ease-in-out;
      transform-origin: center;
    }
    .spinning {
      animation: spin 6s infinite linear;
      transform-origin: center;
    }
  </style>

  <circle cx="50" cy="50" r="45" fill="url(#gradPulse)" filter="url(#shadow)" class="pulsing"/>
  
  <!-- Outer dashed ring spinning -->
  <circle cx="50" cy="50" r="40" fill="none" stroke="#fff" stroke-width="2" stroke-dasharray="10 5" class="spinning"/>
  
  <!-- Star icon -->
  <path d="M50 30 L55 45 L70 45 L58 55 L62 70 L50 60 L38 70 L42 55 L30 45 L45 45 Z" fill="#fff" class="pulsing"/>
</svg>
